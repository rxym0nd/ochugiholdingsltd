<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ochugi Holdings — Trade Log</title>
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div><div class="cursor-ring" id="cursorRing"></div>
<div id="loadingScreen"><div class="loading-logo">TRADES<span>.</span></div><div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div><div class="loading-label">Loading Trade Data</div></div>
<nav class="topnav" id="topnav"></nav><div class="mobile-menu" id="mobileMenu"></div>
<div class="page-wrap"><div class="page-content">
  <div class="page-hero"><div class="container">
    <div class="page-hero-label">Trade History · Feb 9 – Mar 7, 2026</div>
    <h1 class="page-hero-title">TRADE<br><em>LOG</em></h1>
    <p class="page-hero-sub">60 total trades · 32 wins · 28 losses · +$173.87 net P&L</p>
  </div></div>
  <div class="ticker-wrap"><div class="ticker-track" id="statTicker"><div class="ticker-item"><span>Loading…</span></div></div></div>
  <div class="container">
    <div id="newsAlertBar" style="padding-top:40px;"></div>
    <div class="grid-4 mb-32 reveal" id="tradeStats"></div>
    <div class="card mb-32 reveal">
      <div class="card-header"><span class="card-title">📋 Full Trade Log</span><span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);">60 trades · Raymond only</span></div>
      <div class="table-wrap" id="tradeTable" style="border:none;border-radius:0;"></div>
    </div>
  </div>
  <div style="border-top:1px solid var(--border);padding:60px 0;background:var(--bg-1);text-align:center;margin-top:20px;">
    <div class="container"><div class="split-title" style="opacity:0.08;">60<br>TRADES</div></div>
  </div>
</div></div>
<script src="js/data.js"></script><script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var r=OCHUGI_DATA.raymond;
  var sd=[
    {label:'Total Trades',value:r.totalTrades,sub:'Feb 9 – Mar 7, 2026',cls:'neutral',accent:'blue'},
    {label:'Win Rate',value:r.winRate+'%',sub:r.wins+'W · '+r.losses+'L',cls:'neutral',accent:'green'},
    {label:'Net P&L',value:'+$'+r.netPnL.toFixed(2),sub:'profit factor '+r.profitFactor,cls:'positive',accent:'green'},
    {label:'Avg Per Trade',value:'+$'+r.expectancy,sub:'expectancy',cls:'gold',accent:'gold'}
  ];
  var sh='';for(var i=0;i<sd.length;i++){var s=sd[i];sh+='<div class="stat-card '+escapeHTML(s.accent)+'"><div class="stat-label">'+escapeHTML(s.label)+'</div><div class="stat-value '+escapeHTML(s.cls)+'">'+escapeHTML(s.value)+'</div><div class="stat-sub">'+escapeHTML(s.sub)+'</div></div>';}
  document.getElementById('tradeStats').innerHTML=sh;
  var th='<table><thead><tr><th>#</th><th>Date</th><th>Instrument</th><th>Direction</th><th>Session</th><th>P&L</th><th>R:R</th><th>Result</th></tr></thead><tbody>';
  var trades=OCHUGI_DATA.trades;
  for(var i=0;i<trades.length;i++){
    var t=trades[i];var isWin=t.pnl>0;
    th+='<tr><td class="mono" style="color:var(--text-muted);">'+(i+1)+'</td>'
      +'<td class="mono">'+escapeHTML(t.date)+'</td><td class="primary mono">'+escapeHTML(t.instrument)+'</td>'
      +'<td><span class="chip chip-'+escapeHTML(t.direction.toLowerCase())+'">'+escapeHTML(t.direction)+'</span></td>'
      +'<td style="font-size:0.78rem;color:var(--text-secondary);">'+escapeHTML(t.session)+'</td>'
      +'<td class="mono" style="color:'+(isWin?'var(--green)':'var(--red)')+';">'+(isWin?'+':'')+'$'+t.pnl.toFixed(2)+'</td>'
      +'<td class="mono">'+escapeHTML(t.rr)+'</td>'
      +'<td><span class="chip chip-'+(isWin?'win':'loss')+'">'+(isWin?'WIN':'LOSS')+'</span></td></tr>';
  }
  document.getElementById('tradeTable').innerHTML=th+'</tbody></table>';
});
</script>
</body></html>
