<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ochugi Holdings — Backtesting</title>
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div><div class="cursor-ring" id="cursorRing"></div>
<div id="loadingScreen"><div class="loading-logo">BACKTEST<span>.</span></div><div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div><div class="loading-label">Loading Backtest Data</div></div>
<nav class="topnav" id="topnav"></nav><div class="mobile-menu" id="mobileMenu"></div>
<div class="page-wrap"><div class="page-content">
  <div class="page-hero"><div class="container">
    <div class="page-hero-label">Strategy Research · Historical Data</div>
    <h1 class="page-hero-title">BACKTEST<br><em>LOG</em></h1>
    <p class="page-hero-sub">4 strategies tested · Only approved strategies go live</p>
  </div></div>
  <div class="ticker-wrap"><div class="ticker-track" id="statTicker"><div class="ticker-item"><span>Loading…</span></div></div></div>
  <div class="container">
    <div id="newsAlertBar" style="padding-top:40px;"></div>
    <div id="backtestCards" style="margin-top:8px;"></div>
  </div>
  <div style="border-top:1px solid var(--border);padding:60px 0;background:var(--bg-1);text-align:center;margin-top:40px;">
    <div class="container"><div class="split-title" style="opacity:0.08;">TEST<br>FIRST</div></div>
  </div>
</div></div>
<script src="js/data.js"></script><script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var tests=OCHUGI_DATA.backtests;var html='';
  for(var i=0;i<tests.length;i++){
    var t=tests[i];var approved=t.status==='approved';
    html+='<div class="card mb-24 reveal" style="border-left:3px solid '+(approved?'var(--green)':'var(--text-muted)'+';')+(approved?'':'')+';">'
      +'<div class="card-header"><div><div class="card-title">'+escapeHTML(t.name)+'</div><div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);margin-top:2px;">'+escapeHTML(t.instrument)+' · '+escapeHTML(t.period)+' · '+escapeHTML(t.trades)+' trades</div></div>'
      +'<span class="badge '+(approved?'badge-green':'badge-gray')+'">'+escapeHTML(t.status.toUpperCase())+'</span></div>'
      +'<div class="card-body"><div class="grid-4" style="gap:12px;margin-bottom:16px;">'
      +'<div style="background:var(--bg-1);border-radius:8px;padding:12px;border:1px solid var(--border);"><div class="stat-label">WIN RATE</div><div style="font-family:var(--font-display);font-size:1.4rem;color:var(--green);">'+escapeHTML(t.wr)+'%</div></div>'
      +'<div style="background:var(--bg-1);border-radius:8px;padding:12px;border:1px solid var(--border);"><div class="stat-label">PROFIT FACTOR</div><div style="font-family:var(--font-display);font-size:1.4rem;color:var(--gold);">'+escapeHTML(t.pf)+'</div></div>'
      +'<div style="background:var(--bg-1);border-radius:8px;padding:12px;border:1px solid var(--border);"><div class="stat-label">MAX DD</div><div style="font-family:var(--font-display);font-size:1.4rem;color:var(--yellow);">'+escapeHTML(t.maxDD)+'%</div></div>'
      +'<div style="background:var(--bg-1);border-radius:8px;padding:12px;border:1px solid var(--border);"><div class="stat-label">NET RESULT</div><div style="font-family:var(--font-display);font-size:1.4rem;color:var(--green);">'+escapeHTML(t.result)+'</div></div>'
      +'</div><div style="font-size:0.82rem;color:var(--text-secondary);">'+escapeHTML(t.notes)+'</div></div></div>';
  }
  document.getElementById('backtestCards').innerHTML=html;
});
</script>
</body></html>
