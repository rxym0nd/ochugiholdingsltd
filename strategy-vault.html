<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ochugi Holdings — Strategy Vault</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div id="loadingScreen">
  <div class="loading-logo">VAULT<span>.</span></div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
  <div class="loading-label">Loading Strategy Data</div>
</div>
<nav class="topnav" id="topnav"></nav>
<div class="mobile-menu" id="mobileMenu"></div>
<div class="page-wrap"><div class="page-content">

  <div class="page-hero">
    <div class="container">
      <div class="page-hero-label">3 Active Strategies · Backtested & Approved</div>
      <h1 class="page-hero-title">STRATEGY<br><em>VAULT</em></h1>
      <p class="page-hero-sub">Only proven strategies. Backtested and approved before live use.</p>
    </div>
  </div>

  <div class="ticker-wrap"><div class="ticker-track" id="statTicker"><div class="ticker-item"><span>Loading…</span></div></div></div>

  <div class="container section">
    <div id="newsAlertBar" class="mb-32"></div>
    <div id="strategyCards"></div>
  </div>

  <div style="border-top:1px solid var(--border);padding:60px 0;background:var(--bg-1);text-align:center;margin-top:40px;">
    <div class="container"><div class="split-title" style="opacity:0.08;">EDGE<br>ONLY</div></div>
  </div>

</div></div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script>
document.addEventListener('OchugiDataLoaded', function() {
  var strategies = [
    {name:'XAUUSD Asian Session Pullback',emoji:'🥇',wr:'57.1%',pf:'2.08',expectancy:'+$3.47',confidence:8,session:'Asian (02:00–06:00 EAT)',tf:'M15',instrument:'XAUUSD',color:'var(--accent)',
     entry:['D1 must be in uptrend (higher highs, higher lows)','Price pulls back to H4 demand zone','M15 bullish engulfing or pin bar signal at zone','Min 1:2 R:R confirmed before entry'],
     sl:'Below M15 signal candle low or order block. Max 15 points.',tp:'Next H4 resistance level. Min 1:2 R:R.',
     filters:['Asian session only (02:00–06:00 EAT)','No red news events in next 60 min','Pre-Trade Scorecard score 6 or above','D1 uptrend structure intact']},
    {name:'GBP Pairs London Open Momentum',emoji:'💷',wr:'75%',pf:'4.57',expectancy:'+$12.36',confidence:7,session:'London (11:00–13:00 EAT)',tf:'M15',instrument:'GBPUSD / GBPNZD / GBPJPY',color:'var(--blue)',
     entry:['London open: GBP pair breaks Asian session range high or low','Strong momentum candle confirms the breakout','Enter on first M15 pullback after the break','H4 structure must confirm the direction'],
     sl:'Below or above Asian range boundary. Max 20 pips.',tp:'Previous day high or low. Min 1:3 R:R.',
     filters:['London open only (11:00–13:00 EAT)','No BOE event within 24 hours','H4 structure break confirmed','Scorecard score 6 or above required']},
    {name:'GER30 Overlap Breakout',emoji:'📊',wr:'66.7%',pf:'5.16',expectancy:'+$15.69',confidence:6,session:'Overlap (15:00–18:00 EAT)',tf:'H1',instrument:'GER30 only — NOT US30',color:'var(--purple)',
     entry:['GER30 H4 consolidation zone identified','H4 breakout candle with strong momentum closes','H1 candle closes above or below key level','Strong range expansion on breakout candle'],
     sl:'Below H1 breakout candle body. Max 25 points.',tp:'Previous H4 swing high or low. Min 1:2.5 R:R.',
     filters:['GER30 only — US30 is kill list','No major US data release within 90 min','Scorecard score 7 or above required','London/NY overlap session only']}
  ];

  var html='<div class="bento-grid" style="gap:24px;">';
  for(var i=0;i<strategies.length;i++){
    var s=strategies[i];
    var entHtml='';for(var j=0;j<s.entry.length;j++){entHtml+='<div style="display:flex;gap:12px;margin-bottom:12px;font-size:0.85rem;color:var(--text-secondary);"><span style="color:'+escapeHTML(s.color)+';font-weight:700;flex-shrink:0;">'+(j+1)+'.</span>'+escapeHTML(s.entry[j])+'</div>';}
    var filHtml='';for(var j=0;j<s.filters.length;j++){filHtml+='<div style="display:flex;gap:12px;margin-bottom:12px;font-size:0.85rem;color:var(--text-secondary);"><span style="color:var(--green);flex-shrink:0;">✓</span>'+escapeHTML(s.filters[j])+'</div>';}

    html+='<div class="col-12 card reveal" style="border-left:3px solid '+escapeHTML(s.color)+';">'
      +'<div class="card-header"><div><div class="card-title">'+escapeHTML(s.emoji)+' '+escapeHTML(s.name)+'</div><div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);margin-top:4px;">'+escapeHTML(s.instrument)+' · '+escapeHTML(s.tf)+' · '+escapeHTML(s.session)+'</div></div>'
      +'<div style="display:flex;gap:24px;align-items:center;">'
      +'<div style="text-align:center;"><div class="stat-label">WIN RATE</div><div style="font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--green);">'+escapeHTML(s.wr)+'</div></div>'
      +'<div style="text-align:center;"><div class="stat-label">P.FACTOR</div><div style="font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:'+escapeHTML(s.color)+';">'+escapeHTML(s.pf)+'</div></div>'
      +'<div style="text-align:center;"><div class="stat-label">EXPECT.</div><div style="font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--green);">'+escapeHTML(s.expectancy)+'</div></div>'
      +'</div></div>'
      +'<div class="card-body"><div class="bento-grid" style="gap:32px;">'
      +'<div class="col-6"><div class="section-title">Entry Rules</div>'+entHtml
      +'<div style="margin-top:24px;"><div class="section-title">Stop Loss</div><div style="font-size:0.85rem;color:var(--text-secondary);">'+escapeHTML(s.sl)+'</div></div>'
      +'<div style="margin-top:24px;"><div class="section-title">Take Profit</div><div style="font-size:0.85rem;color:var(--text-secondary);">'+escapeHTML(s.tp)+'</div></div></div>'
      +'<div class="col-6"><div class="section-title">Filters Required</div>'+filHtml
      +'<div style="margin-top:24px;"><div class="section-title">Confidence</div>'
      +'<div style="display:flex;align-items:center;gap:12px;">'
      +'<div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="width:'+escapeHTML(s.confidence*10)+'%;height:100%;background:'+escapeHTML(s.color)+';border-radius:3px;"></div></div>'
      +'<span style="font-family:var(--font-mono);font-size:0.8rem;font-weight:700;color:'+escapeHTML(s.color)+';">'+escapeHTML(s.confidence)+'/10</span>'
      +'</div></div></div></div></div></div>';
  }
  html += '</div>';
  document.getElementById('strategyCards').innerHTML=html;
});
</script>
</body>
</html>
