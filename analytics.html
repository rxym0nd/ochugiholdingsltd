<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ochugi Holdings — Analytics</title>
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div><div class="cursor-ring" id="cursorRing"></div>
<div id="loadingScreen"><div class="loading-logo">STATS<span>.</span></div><div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div><div class="loading-label">Loading Analytics</div></div>
<nav class="topnav" id="topnav"></nav><div class="mobile-menu" id="mobileMenu"></div>
<div class="page-wrap"><div class="page-content">
  <div class="page-hero"><div class="container">
    <div class="page-hero-label">Performance Analytics · Comparative</div>
    <h1 class="page-hero-title">ANALYTICS<br><em>HUB</em></h1>
    <p class="page-hero-sub">Deep performance breakdown · Session edge · Instrument analysis</p>
  </div></div>
  <div class="ticker-wrap"><div class="ticker-track" id="statTicker"><div class="ticker-item"><span>Loading…</span></div></div></div>
  <div class="container">
    <div id="newsAlertBar" style="padding-top:40px;"></div>
    <div class="grid-4 mb-32 reveal" id="analyticsStats"></div>
    <div class="grid-2 mb-32">
      <div class="card reveal">
        <div class="card-header"><span class="card-title">📊 Risk-Adjusted Metrics</span></div>
        <div class="card-body" id="riskMetrics"></div>
      </div>
      <div class="card reveal reveal-delay-1">
        <div class="card-header"><span class="card-title">🏆 Best vs Worst</span></div>
        <div class="card-body" id="bestWorst"></div>
      </div>
    </div>
    <div class="card mb-32 reveal">
      <div class="card-header"><span class="card-title">📅 Day-of-Week Performance</span></div>
      <div id="dowTable"></div>
    </div>
  </div>
  <div style="border-top:1px solid var(--border);padding:60px 0;background:var(--bg-1);text-align:center;margin-top:20px;">
    <div class="container"><div class="split-title" style="opacity:0.08;">DATA<br>WINS</div></div>
  </div>
</div></div>
<script src="js/data.js"></script><script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var r=OCHUGI_DATA.raymond;
  var sd=[
    {label:'Sharpe Ratio',value:r.sharpe,sub:'Higher is better',cls:'gold',accent:'gold'},
    {label:'Profit Factor',value:r.profitFactor,sub:'Gross profit / gross loss',cls:'positive',accent:'green'},
    {label:'Max Drawdown',value:r.maxDrawdownPct+'%',sub:'$'+r.maxDrawdown.toFixed(2)+' worst peak-to-trough',cls:'gold',accent:'yellow'},
    {label:'Expectancy',value:'+$'+r.expectancy,sub:'Per trade average outcome',cls:'positive',accent:'green'}
  ];
  var sh='';for(var i=0;i<sd.length;i++){var s=sd[i];sh+='<div class="stat-card '+s.accent+'"><div class="stat-label">'+s.label+'</div><div class="stat-value '+s.cls+'">'+s.value+'</div><div class="stat-sub">'+s.sub+'</div></div>';}
  document.getElementById('analyticsStats').innerHTML=sh;
  document.getElementById('riskMetrics').innerHTML=
    '<div class="list-item"><div class="list-item-label">Recovery Factor</div><div class="list-item-value text-gold">4.57</div></div>'
    +'<div class="list-item"><div class="list-item-label">Calmar Ratio</div><div class="list-item-value text-gold">61.7</div></div>'
    +'<div class="list-item"><div class="list-item-label">Avg Win</div><div class="list-item-value" style="color:var(--green);">$'+r.avgWin+'</div></div>'
    +'<div class="list-item"><div class="list-item-label">Avg Loss</div><div class="list-item-value" style="color:var(--red);">-$'+Math.abs(r.avgLoss)+'</div></div>'
    +'<div class="list-item"><div class="list-item-label">Win/Loss Ratio</div><div class="list-item-value text-gold">'+(r.avgWin/Math.abs(r.avgLoss)).toFixed(2)+'</div></div>';
  document.getElementById('bestWorst').innerHTML=
    '<div class="list-item"><div class="list-item-label">Best Trade</div><div class="list-item-value" style="color:var(--green);">+$'+r.bestTrade.amount+' · '+r.bestTrade.instrument+'</div></div>'
    +'<div class="list-item"><div class="list-item-label">Worst Trade</div><div class="list-item-value" style="color:var(--red);">-$'+Math.abs(r.worstTrade.amount)+' · '+r.worstTrade.instrument+'</div></div>'
    +'<div class="list-item"><div class="list-item-label">Best Session</div><div class="list-item-value" style="color:var(--green);">Asian · 57% WR · +$92.97</div></div>'
    +'<div class="list-item"><div class="list-item-label">Worst Session</div><div class="list-item-value" style="color:var(--red);">NY · 33% WR · -$17.82</div></div>'
    +'<div class="list-item"><div class="list-item-label">Best Instrument</div><div class="list-item-value" style="color:var(--green);">GBPNZD · 67% WR</div></div>';
  var dow=[
    {day:'Monday',trades:12,wr:58,pnl:42.30},
    {day:'Tuesday',trades:14,wr:57,pnl:38.10},
    {day:'Wednesday',trades:11,wr:55,pnl:28.44},
    {day:'Thursday',trades:13,wr:46,pnl:12.20},
    {day:'Friday',trades:10,wr:50,pnl:52.83}
  ];
  var dh='<table><thead><tr><th>Day</th><th>Trades</th><th>Win Rate</th><th>P&L</th></tr></thead><tbody>';
  for(var i=0;i<dow.length;i++){var d=dow[i];dh+='<tr><td class="primary">'+d.day+'</td><td class="mono">'+d.trades+'</td><td class="mono">'+d.wr+'%</td><td class="mono" style="color:var(--green);">+$'+d.pnl.toFixed(2)+'</td></tr>';}
  document.getElementById('dowTable').innerHTML=dh+'</tbody></table>';
});
</script>
</body></html>
